<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <style>
        .menu {
    display: flex;
    justify-content: center; /* Alinha horizontalmente */
    align-items: center;     /* Alinha verticalmente */
    gap: 20px;               /* Espaçamento entre itens */
    background-color: #333;
    padding: 15px;
}

.menu a {
    color: white;
    text-decoration: none;
    padding: 10px;
    transition: 0.3s;
}

.menu a:hover {
    background-color: #555;
    border-radius: 5px;
}
    </style>

    <nav class="menu">
    <a href="#">Home</a>
    <a href="#">Empresa</a>
    <a href="#">Serviços</a>
    <a href="#">Blog</a>
    <a href="#">Contato</a>
</nav>
</body>
</html>

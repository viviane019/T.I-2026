<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
       <style>
        /* Box Model básico */
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

header, footer {
    background-color: #2c3e50;
    color: white;
    padding: 20px;
    text-align: center;
}

.container {
    display: flex; /* Flexbox para as colunas */
    gap: 20px;
    padding: 20px;
}

.coluna {
    flex: 1; /* Faz as colunas ocuparem espaço igual */
    padding: 20px;
    border: 1px solid #ddd;
    box-shadow: 2px 2px 10px rgba(0,0,0,0.1);
    transition: transform 0.3s ease; /* Efeito de transição */
}

.coluna:hover {
    transform: scale(1.02); /* Efeito visual no hover */
}
       </style> 
    <header>
    <h1>Nome da Empresa</h1>
</header>
<nav>
    <a href="#">Home</a>
    <a href="#">Serviços</a>
</nav>

<main class="container">
    <section class="coluna">
        <h2>Conteúdo Principal</h2>
        <p>Texto explicativo aqui.</p>
    </section>
    <section class="coluna">
        <h2>Sidebar</h2>
        <p>Links ou informações adicionais.</p>
    </section>
</main>

<footer>Rodapé</footer>
</body>
</html>

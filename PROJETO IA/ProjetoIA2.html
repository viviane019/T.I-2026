<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio 2</title>
</head>
<body>
     <style>
        /* --- ESTILOS CSS --- */

        .produto {
            width: 350px; /* Largura fixa para todos os produtos */
            margin: 20px auto; /* Centraliza os blocos e adiciona espaço externo */
            padding: 15px; /* Espaço interno para o conteúdo respirar */
            color: #fff; /* Cor do texto para contraste */
            font-family: Arial, sans-serif;
        }

        .bloco-vermelho {
            background-color: #f44336; /* Vermelho vibrante */
        }

        .bloco-verde {
            background-color: #4CAF50; /* Verde vibrante */
        }

        .bloco-azul {
            background-color: #2196F3; /* Azul vibrante */
        }
    </style>
    <h1>Meus Produtos</h1>
    <div class="produto bloco-vermelho">
        <h2>Produto A</h2>
        <p>Observe o espaço interno (padding) colorido e o espaço externo (margin) que me afasta do título.</p>
    </div>
    <div class="produto bloco-verde">
        <h2>Produto B</h2>
        <p>A borda verde define o limite entre o meu preenchimento e o mundo exterior.</p>
    </div>
    <div class="produto bloco-azul">
        <h2>Produto C</h2>
        <p>A largura de 350px é mantida rigorosamente aqui.</p>
    </div>
    </body>
</html>
</body>
</html>
